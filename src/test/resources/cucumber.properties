# Cucumber engine configuration (https://github.com/cucumber/cucumber-jvm)
cucumber.publish.quiet=true
cucumber.execution.parallel.enabled=false
cucumber.snippet-type=camelcase
# Skip special scenarios by default: @sim/@otp need a SIM-enabled build, @applepay
# needs an Apple Pay-entitled iOS app + private-beta access. Override on the CLI,
# e.g. -Dcucumber.filter.tags="@otp" or "@applepay".
cucumber.filter.tags=not @sim and not @applepay
