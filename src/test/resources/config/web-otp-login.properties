# =====================================================================
# Web SMS-OTP login sample - per-site configuration
# =====================================================================
# Adapt this sample to YOUR login page here (no code changes needed).
# Every key can also be overridden on the CLI, e.g.:
#   mvn test -Pandroid -Dbstack.sim=true -Dcucumber.filter.tags="@otp" \
#       -Dweblogin.url=https://your.site/login
#
# Locator format: prefix with css= / xpath= / id= / name=. With no prefix,
# values starting with // or ( are treated as XPath, otherwise as CSS.
# Inspect your page's elements with BrowserStack App Live or Appium Inspector.
# =====================================================================

# The login page to open in Chrome on the device.
weblogin.url=https://www.example.com/login

# Button that opens the login form / modal.
weblogin.loginButton=xpath=//button[normalize-space(.)='Login']

# Mobile-number input field.
weblogin.mobileInput=css=#mobile

# Button that requests the OTP after the number is entered.
weblogin.requestOtpButton=xpath=//button[normalize-space(.)='Get OTP']

# The OTP input(s). May match several single-digit boxes or one field.
weblogin.otpBox=css=input.otp-box

# Button that submits/verifies the entered OTP.
weblogin.verifyButton=css=button[type='submit']

# Number of digits in the OTP.
weblogin.otpLength=6

# How many trailing digits of the SIM number to enter (country code stripped).
weblogin.phoneDigits=10

# Substring identifying the OTP SMS sender or body (blank = match any SMS).
weblogin.smsSender=

# Substring of any rate-limit / abuse / error message that means the OTP
# request was rejected (so the test fails fast with a clear reason).
weblogin.blockedText=blocked
